<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million Checkboxes | Interactive Grid</title>
    <meta name="description" content="Collaborative real-time grid of 1,000,000 checkboxes.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Landing Page (Required Auth Wall) -->
    <div id="landing-page" class="landing-page">
        <div class="landing-content">
            <img src="logo.png" alt="1 Million Checkboxes Logo" class="landing-logo">
            <p>Sign in to interact with a real-time collaborative grid.</p>
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <button id="login-landing-btn" class="btn btn-primary btn-large">Sign in with Google</button>
                <button id="guest-login-btn" class="btn btn-large" style="background: rgba(255,255,255,0.1)">Enter as Guest</button>
            </div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app-container" class="app-container hidden">
        <header>
            <div class="logo">
                <span class="gradient-text">1M</span> Checkboxes
            </div>
            
            <div class="stats">
                <div class="stat-item">
                    <span id="total-checked">0</span>
                    <label>Checked</label>
                </div>
                <div class="stat-item">
                    <span id="online-users">0</span>
                    <label>Online</label>
                </div>
                <div class="stat-item">
                    <span id="connection-status">Online</span>
                    <label>Status</label>
                </div>
            </div>

            <div id="user-info" class="auth-controls">
                <button id="reset-btn" class="btn btn-secondary">Reset Grid</button>
                <div class="user-badge">
                    <span id="user-display-name">User</span>
                    <button id="logout-btn" class="btn-icon">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <main>
            <div class="controls-panel">
                <div class="input-group">
                    <label>Cols</label>
                    <input type="number" id="input-cols" value="1000" min="1" max="2000">
                </div>
                <div class="input-group">
                    <label>Rows</label>
                    <input type="number" id="input-rows" value="1000" min="1" max="2000">
                </div>
                <button id="resize-btn" class="btn btn-primary">Apply</button>
            </div>

            <div id="scroll-container" class="scroll-container">
                <div id="grid-container" class="grid-container">
                    <div id="visible-grid" class="visible-grid"></div>
                </div>
            </div>
        </main>

        <div id="coords" class="coords">Pos: 0, 0</div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="script.js"></script>
</body>
</html>
